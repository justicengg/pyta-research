name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sqlalchemy alembic pydantic-settings apscheduler requests yfinance python-dateutil psycopg2-binary pytest

      - name: Run Alembic migration
        env:
          DATABASE_URL: sqlite:///./ci.db
          PYTHONPATH: .
        run: |
          find alembic/versions -name '._*.py' -delete
          alembic upgrade head

      - name: Run test suite
        env:
          PYTHONPATH: .
        run: pytest -q

      - name: Scheduler smoke test
        env:
          DATABASE_URL: sqlite:///./ci.db
          PYTHONPATH: .
        run: python -m src.cli scheduler run-once
